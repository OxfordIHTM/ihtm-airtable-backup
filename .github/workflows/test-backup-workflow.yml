name: test backup workflow

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-backup-workflow:
    #runs-on: ubuntu-latest
    runs-on: self-hosted
    #container: rocker/tidyverse:4.5.3
    env:
      AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
      IHTM_METADATA_BASE_ID: ${{ secrets.IHTM_METADATA_BASE_ID }}
    steps:
      - uses: actions/checkout@v6
      
      # - name: Install system dependencies
      #   run: |
      #     apt-get update && apt-get install -y --no-install-recommends \
      #     libxt6 libglpk-dev libuv1-dev cmake
          
      # - name: Trust git repo
      #   run: |
      #     git config --global --add safe.directory /__w/ihtm-airtable-backup/ihtm-airtable-backup
          
      - name: Install packages from renv.lock (with cache)
        if: ${{ !env.ACT }}  
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Install packages from renv.lock (local, no cache)
        if: ${{ env.ACT }}  
        run: |
          renv::restore()
        shell: Rscript {0}
        
      - name: Run workflow
        run: |
          targets::tar_make()
        shell: Rscript {0}
        
        